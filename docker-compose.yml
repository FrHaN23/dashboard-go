services:
  mysql-db:
    image: mysql:8.0
    container_name: article_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: article
      MYSQL_USER: user
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - article_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go Backend Service
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: article_backend_container
    restart: always
    ports:
      - "5050:5050"
    environment:
      - HTTP_ADDR=:5050
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_USERNAME=user
      - DB_PASSWORD=password123
      - DB_NAME=article
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - article_network

volumes:
  mysql_data:

networks:
  article_network:
    driver: bridge
