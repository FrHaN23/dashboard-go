services:
  mysql-db:
    image: mysql:8.0
    container_name: article_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: article         
      MYSQL_USER: user               
      MYSQL_PASSWORD: password123     
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - article_network

volumes:
  mysql_data:

networks:
  article_network:
    driver: bridge
